<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Z vs Mario PRO 🔥</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
    margin: auto;
    background: #2e7d32;
    transition: 0.3s;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="500"></canvas>

<audio id="music" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Nombres
let name1 = prompt("Nombre Jugador Z:");
let name2 = prompt("Nombre Jugador Mario:");

if (!name1) name1 = "Z";
if (!name2) name2 = "Mario";

// Estado fuego
let fireMode = false;

// Jugadores
const playerZ = { x: 60, y: 200, w: 20, h: 100, score: 0 };
const playerMario = { x: 920, y: 200, w: 20, h: 100, score: 0 };

// Pelota
const ball = {
    x: 500,
    y: 250,
    r: 10,
    dx: 5,
    dy: 4
};

// Controles
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;

    // ACTIVAR FUEGO
    if (e.key === "Enter") {
        fireMode = !fireMode;
    }
});

document.addEventListener("keyup", e => keys[e.key] = false);

// Movimiento
function movePlayers() {
    if (keys["w"] && playerZ.y > 0) playerZ.y -= 6;
    if (keys["s"] && playerZ.y < canvas.height - playerZ.h) playerZ.y += 6;

    if (keys["ArrowUp"] && playerMario.y > 0) playerMario.y -= 6;
    if (keys["ArrowDown"] && playerMario.y < canvas.height - playerMario.h) playerMario.y += 6;
}

// Lógica pelota
function updateBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.y <= 0 || ball.y >= canvas.height) ball.dy *= -1;

    if (
        ball.x - ball.r < playerZ.x + playerZ.w &&
        ball.y > playerZ.y &&
        ball.y < playerZ.y + playerZ.h
    ) {
        ball.dx *= -1.1;
    }

    if (
        ball.x + ball.r > playerMario.x &&
        ball.y > playerMario.y &&
        ball.y < playerMario.y + playerMario.h
    ) {
        ball.dx *= -1.1;
    }

    if (ball.x < 0) {
        playerMario.score++;
        checkWinner();
        resetBall();
    }

    if (ball.x > canvas.width) {
        playerZ.score++;
        checkWinner();
        resetBall();
    }
}

// GANADOR
function checkWinner() {
    if (playerZ.score >= 20 || playerMario.score >= 20) {
        alert("🏆 Ganó " + (playerZ.score > playerMario.score ? name1 : name2));
        playerZ.score = 0;
        playerMario.score = 0;
    }
}

// Reset
function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.dx = (Math.random() > 0.5 ? 5 : -5);
    ball.dy = (Math.random() * 4 - 2);
}

// Dibujar cancha
function drawField() {

    if (fireMode) {
        canvas.style.background = "radial-gradient(circle, orange, red, black)";
    } else {
        canvas.style.background = "#2e7d32";
    }

    ctx.strokeStyle = "white";
    ctx.setLineDash([10,10]);
    ctx.beginPath();
    ctx.moveTo(canvas.width/2, 0);
    ctx.lineTo(canvas.width/2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = fireMode ? "orange" : "white";
    ctx.fillRect(0,150,10,200);
    ctx.fillRect(canvas.width-10,150,10,200);
}

// Dibujar pelota fuego
function drawBall() {
    ctx.beginPath();

    if (fireMode) {
        let gradient = ctx.createRadialGradient(ball.x, ball.y, 2, ball.x, ball.y, 20);
        gradient.addColorStop(0, "yellow");
        gradient.addColorStop(0.5, "orange");
        gradient.addColorStop(1, "red");
        ctx.fillStyle = gradient;
    } else {
        ctx.fillStyle = "white";
    }

    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
}

// Dibujar
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawField();

    // Z
    ctx.fillStyle = fireMode ? "orange" : "blue";
    ctx.font = "80px Arial";
    ctx.fillText("Z", 20, playerZ.y + 80);

    // Mario simple
    ctx.fillStyle = fireMode ? "orange" : "red";
    ctx.fillRect(playerMario.x, playerMario.y, 20, 100);

    // Pelota
    drawBall();

    // Nombres + score
    ctx.fillStyle = "white";
    ctx.font = "25px Arial";

    ctx.fillText(name1 + ": " + playerZ.score, 200, 40);
    ctx.fillText(name2 + ": " + playerMario.score, 650, 40);
}

// Loop
function gameLoop() {
    movePlayers();
    updateBall();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
