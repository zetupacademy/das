<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Z vs Mario - Tenis Arena</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0b0b0b;
    }
    canvas {
        display: block;
        margin: auto;
        background: #2e7d32; /* VERDE CANCHA */
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Jugadores
const playerZ = { x: 60, y: 200, w: 20, h: 100, score: 0 };
const playerMario = { x: 920, y: 200, w: 20, h: 100, score: 0 };

// Pelota
const ball = {
    x: 500,
    y: 250,
    r: 10,
    dx: 5,
    dy: 4
};

// Controles
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Movimiento
function movePlayers() {
    // Jugador Z (W/S)
    if (keys["w"] && playerZ.y > 0) playerZ.y -= 6;
    if (keys["s"] && playerZ.y < canvas.height - playerZ.h) playerZ.y += 6;

    // Jugador Mario (↑ ↓)
    if (keys["ArrowUp"] && playerMario.y > 0) playerMario.y -= 6;
    if (keys["ArrowDown"] && playerMario.y < canvas.height - playerMario.h) playerMario.y += 6;
}

// Lógica pelota
function updateBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Rebote arriba/abajo
    if (ball.y <= 0 || ball.y >= canvas.height) ball.dy *= -1;

    // Colisión Z
    if (
        ball.x - ball.r < playerZ.x + playerZ.w &&
        ball.y > playerZ.y &&
        ball.y < playerZ.y + playerZ.h
    ) {
        ball.dx *= -1.1; // se acelera
    }

    // Colisión Mario
    if (
        ball.x + ball.r > playerMario.x &&
        ball.y > playerMario.y &&
        ball.y < playerMario.y + playerMario.h
    ) {
        ball.dx *= -1.1;
    }

    // GOL
    if (ball.x < 0) {
        playerMario.score++;
        resetBall();
    }

    if (ball.x > canvas.width) {
        playerZ.score++;
        resetBall();
    }
}

// Reset
function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.dx = (Math.random() > 0.5 ? 5 : -5);
    ball.dy = (Math.random() * 4 - 2);
}

// Dibujar cancha
function drawField() {
    // Línea central
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.setLineDash([10, 10]);
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arcos
    ctx.fillStyle = "white";
    ctx.fillRect(0, 150, 10, 200);
    ctx.fillRect(canvas.width - 10, 150, 10, 200);
}

// Dibujar
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawField();

    // Jugador Z
    ctx.fillStyle = "blue";
    ctx.font = "80px Arial";
    ctx.fillText("Z", 20, playerZ.y + 80);

    // Jugador Mario (simple)
    ctx.fillStyle = "red";
    ctx.fillRect(playerMario.x, playerMario.y, 20, 100);

    ctx.fillStyle = "yellow";
    ctx.fillRect(playerMario.x, playerMario.y, 20, 20);

    // Pelota
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    // Marcador
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(playerZ.score, canvas.width / 2 - 60, 50);
    ctx.fillText(playerMario.score, canvas.width / 2 + 40, 50);
}

// Loop
function gameLoop() {
    movePlayers();
    updateBall();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
