<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Z vs Mario SPACE 🔥🚀</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
canvas {
    display: block;
    margin: auto;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="600"></canvas>

<!-- Música -->
<audio id="music" autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- Sonidos -->
<audio id="hitSound">
<source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<audio id="goalSound">
<source src="https://www.soundjay.com/button/beep-10.wav">
</audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// CENTRAR CANCHA
const field = {
    x: 150,
    y: 50,
    w: 700,
    h: 500
};

// Nombres
let name1 = prompt("Jugador Z:");
let name2 = prompt("Jugador Mario:");

if (!name1) name1 = "Z";
if (!name2) name2 = "Mario";

// Sonidos
const hitSound = document.getElementById("hitSound");
const goalSound = document.getElementById("goalSound");

// Estado fuego
let fireMode = false;

// Jugadores
const playerZ = { x: field.x + 20, y: 250, w: 15, h: 100, score: 0 };
const playerMario = { x: field.x + field.w - 35, y: 250, w: 15, h: 100, score: 0 };

// Pelota
const ball = {
    x: field.x + field.w / 2,
    y: field.y + field.h / 2,
    r: 8,
    dx: 5,
    dy: 4
};

// Partículas fuego
let particles = [];

// Controles
let keys = {};
document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === "Enter") fireMode = !fireMode;
});
document.addEventListener("keyup", e => keys[e.key] = false);

// Movimiento
function movePlayers() {
    if (keys["w"] && playerZ.y > field.y) playerZ.y -= 6;
    if (keys["s"] && playerZ.y < field.y + field.h - playerZ.h) playerZ.y += 6;

    if (keys["ArrowUp"] && playerMario.y > field.y) playerMario.y -= 6;
    if (keys["ArrowDown"] && playerMario.y < field.y + field.h - playerMario.h) playerMario.y += 6;
}

// Pelota
function updateBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.y < field.y || ball.y > field.y + field.h) ball.dy *= -1;

    // Colisiones
    if (
        ball.x - ball.r < playerZ.x + playerZ.w &&
        ball.y > playerZ.y &&
        ball.y < playerZ.y + playerZ.h
    ) {
        ball.dx *= -1.1;
        hitSound.play();
    }

    if (
        ball.x + ball.r > playerMario.x &&
        ball.y > playerMario.y &&
        ball.y < playerMario.y + playerMario.h
    ) {
        ball.dx *= -1.1;
        hitSound.play();
    }

    // GOL
    if (ball.x < field.x) {
        playerMario.score++;
        goalSound.play();
        checkWinner();
        resetBall();
    }

    if (ball.x > field.x + field.w) {
        playerZ.score++;
        goalSound.play();
        checkWinner();
        resetBall();
    }
}

// Ganador
function checkWinner() {
    if (playerZ.score >= 20 || playerMario.score >= 20) {
        alert("🏆 Ganó " + (playerZ.score > playerMario.score ? name1 : name2));
        playerZ.score = 0;
        playerMario.score = 0;
    }
}

// Reset
function resetBall() {
    ball.x = field.x + field.w / 2;
    ball.y = field.y + field.h / 2;
    ball.dx = (Math.random() > 0.5 ? 5 : -5);
    ball.dy = Math.random() * 4 - 2;
}

// Partículas fuego
function createFire() {
    if (!fireMode) return;
    particles.push({
        x: ball.x,
        y: ball.y,
        size: Math.random() * 5,
        life: 20
    });
}

// Dibujar fuego
function drawFire() {
    particles.forEach((p, i) => {
        ctx.fillStyle = "orange";
        ctx.fillRect(p.x, p.y, p.size, p.size);
        p.life--;
        p.y -= 1;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

// Fondo espacio
function drawSpace() {
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // estrellas
    for (let i = 0; i < 100; i++) {
        ctx.fillStyle = "white";
        ctx.fillRect(Math.random()*1000, Math.random()*600, 2, 2);
    }

    // cohete
    ctx.fillStyle = "gray";
    ctx.fillRect(850, 100, 20, 60);
    ctx.fillStyle = "orange";
    ctx.fillRect(855, 160, 10, 20);
}

// Cancha
function drawField() {
    ctx.fillStyle = fireMode ? "#552200" : "#2e7d32";
    ctx.fillRect(field.x, field.y, field.w, field.h);

    ctx.strokeStyle = "white";
    ctx.setLineDash([10,10]);
    ctx.beginPath();
    ctx.moveTo(field.x + field.w/2, field.y);
    ctx.lineTo(field.x + field.w/2, field.y + field.h);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "white";
    ctx.fillRect(field.x, field.y + 150, 5, 200);
    ctx.fillRect(field.x + field.w - 5, field.y + 150, 5, 200);
}

// Dibujar
function draw() {
    drawSpace();
    drawField();

    // Jugadores
    ctx.fillStyle = fireMode ? "orange" : "blue";
    ctx.fillText("Z", playerZ.x - 10, playerZ.y + 70);

    ctx.fillStyle = fireMode ? "orange" : "red";
    ctx.fillRect(playerMario.x, playerMario.y, 15, 100);

    // Pelota
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fillStyle = fireMode ? "orange" : "white";
    ctx.fill();

    createFire();
    drawFire();

    // Score
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(name1 + ": " + playerZ.score, 200, 30);
    ctx.fillText(name2 + ": " + playerMario.score, 700, 30);
}

// Loop
function gameLoop() {
    movePlayers();
    updateBall();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
