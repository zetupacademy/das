<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ZETUP IA</title>
<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #ffffff;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.container {
width: 100%;
max-width: 500px;
text-align: center;
}

h1 {
color: #6C5CE7;
margin-bottom: 10px;
}

p {
color: #888;
margin-bottom: 30px;
}

input {
width: 100%;
padding: 15px;
border-radius: 30px;
border: 1px solid #ddd;
outline: none;
font-size: 16px;
}

button {
margin-top: 15px;
width: 100%;
padding: 15px;
border: none;
border-radius: 30px;
background: linear-gradient(90deg, #6C5CE7, #00CEC9);
color: white;
font-size: 16px;
cursor: pointer;
}

.response {
margin-top: 25px;
padding: 20px;
border-radius: 15px;
background: #f5f5f5;
display: none;
}
</style>
</head>
<body>

<div class="container">
<h1>ZETUP IA</h1>
<p>Pregunta sobre campañas publicitarias</p>

<input type="text" id="question" placeholder="Escribe tu pregunta...">

<button onclick="responder()">Preguntar</button>

<div class="response" id="response">
HOLA, SOY DAVID ESTA ES MI PRIMERA PAGINA WEB, BICHT!!!
</div>
</div>

<script>
function responder() {
document.getElementById("response").style.display = "block";
}
</script>

</body>
</html>
