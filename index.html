<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Z vs Mario CONSTELACIÓN 🌌</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
canvas {
    display: block;
    margin: auto;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="1000" height="600"></canvas>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<audio id="hitSound">
<source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<audio id="goalSound">
<source src="https://www.soundjay.com/button/beep-10.wav">
</audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// CANCHA CENTRADA
const field = {
    w: 700,
    h: 400
};
field.x = (canvas.width - field.w) / 2;
field.y = (canvas.height - field.h) / 2;

// AUDIO
const music = document.getElementById("music");
const hitSound = document.getElementById("hitSound");
const goalSound = document.getElementById("goalSound");

// Nombres
let name1 = prompt("Jugador Z:") || "Z";
let name2 = prompt("Jugador Mario:") || "Mario";

// Estado fuego
let fireMode = false;

// Jugadores
const playerZ = { x: field.x + 20, y: field.y + 150, w: 15, h: 100, score: 0 };
const playerMario = { x: field.x + field.w - 35, y: field.y + 150, w: 15, h: 100, score: 0 };

// Pelota
const ball = {
    x: field.x + field.w / 2,
    y: field.y + field.h / 2,
    r: 8,
    dx: 5,
    dy: 4
};

// Partículas
let particles = [];

// CONSTELACIONES
const stars = [];
for (let i = 0; i < 40; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height
    });
}

// CONTROLES
let keys = {};
document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (e.key === "Enter") fireMode = !fireMode;

    // 🎵 ACTIVAR MUSICA CON "5"
    if (e.key === "5") {
        if (music.paused) music.play();
    }
});
document.addEventListener("keyup", e => keys[e.key] = false);

// MOVIMIENTO
function movePlayers() {
    if (keys["w"] && playerZ.y > field.y) playerZ.y -= 6;
    if (keys["s"] && playerZ.y < field.y + field.h - playerZ.h) playerZ.y += 6;

    if (keys["ArrowUp"] && playerMario.y > field.y) playerMario.y -= 6;
    if (keys["ArrowDown"] && playerMario.y < field.y + field.h - playerMario.h) playerMario.y += 6;
}

// PELOTA
function updateBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.y < field.y || ball.y > field.y + field.h) ball.dy *= -1;

    if (
        ball.x - ball.r < playerZ.x + playerZ.w &&
        ball.y > playerZ.y &&
        ball.y < playerZ.y + playerZ.h
    ) {
        ball.dx *= -1.1;
        hitSound.play();
    }

    if (
        ball.x + ball.r > playerMario.x &&
        ball.y > playerMario.y &&
        ball.y < playerMario.y + playerMario.h
    ) {
        ball.dx *= -1.1;
        hitSound.play();
    }

    if (ball.x < field.x) {
        playerMario.score++;
        goalSound.play();
        checkWinner();
        resetBall();
    }

    if (ball.x > field.x + field.w) {
        playerZ.score++;
        goalSound.play();
        checkWinner();
        resetBall();
    }
}

// GANADOR
function checkWinner() {
    if (playerZ.score >= 20 || playerMario.score >= 20) {
        alert("🏆 Ganó " + (playerZ.score > playerMario.score ? name1 : name2));
        playerZ.score = 0;
        playerMario.score = 0;
    }
}

// RESET
function resetBall() {
    ball.x = field.x + field.w / 2;
    ball.y = field.y + field.h / 2;
    ball.dx = (Math.random() > 0.5 ? 5 : -5);
    ball.dy = Math.random() * 4 - 2;
}

// FUEGO
function createFire() {
    if (!fireMode) return;
    particles.push({
        x: ball.x,
        y: ball.y,
        life: 20
    });
}

function drawFire() {
    particles.forEach((p, i) => {
        ctx.fillStyle = "orange";
        ctx.fillRect(p.x, p.y, 3, 3);
        p.y -= 1;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

// 🌌 CONSTELACIÓN
function drawConstellation() {
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // puntos
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.fillRect(s.x, s.y, 2, 2);
    });

    // líneas (conectar cercanos)
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    stars.forEach(a => {
        stars.forEach(b => {
            let dist = Math.hypot(a.x - b.x, a.y - b.y);
            if (dist < 120) {
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            }
        });
    });
}

// CANCHA
function drawField() {
    ctx.fillStyle = fireMode ? "#552200" : "#2e7d32";
    ctx.fillRect(field.x, field.y, field.w, field.h);

    ctx.strokeStyle = "white";
    ctx.setLineDash([10,10]);
    ctx.beginPath();
    ctx.moveTo(field.x + field.w/2, field.y);
    ctx.lineTo(field.x + field.w/2, field.y + field.h);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillRect(field.x, field.y + 120, 5, 160);
    ctx.fillRect(field.x + field.w - 5, field.y + 120, 5, 160);
}

// DIBUJAR
function draw() {
    drawConstellation();
    drawField();

    ctx.fillStyle = fireMode ? "orange" : "blue";
    ctx.font = "60px Arial";
    ctx.fillText("Z", playerZ.x - 10, playerZ.y + 60);

    ctx.fillStyle = fireMode ? "orange" : "red";
    ctx.fillRect(playerMario.x, playerMario.y, 15, 100);

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fillStyle = fireMode ? "orange" : "white";
    ctx.fill();

    createFire();
    drawFire();

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(name1 + ": " + playerZ.score, 200, 30);
    ctx.fillText(name2 + ": " + playerMario.score, 700, 30);
}

// LOOP
function gameLoop() {
    movePlayers();
    updateBall();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
